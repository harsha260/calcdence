name: attandance_manager
description: "CampX Student Attendance Tracking App"
publish_to: 'none'
version: 0.5.0+5

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # HTTP client
  http: ^1.2.0
  
  # Secure storage for credentials
  flutter_secure_storage: ^9.2.2
  
  # State management
  provider: ^6.1.2
  
  # For persisting theme preference
  shared_preferences: ^2.3.2
  
  # Attendance charts
  fl_chart: ^0.70.2
  
  # Calendar view
  table_calendar: ^3.1.2
  
  # Local notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  
  # For pull-to-refresh
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
